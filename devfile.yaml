## Based on https://github.com/cgruver/ocp-4-18-nested-container-tech-preview/blob/main/devfile.yaml

schemaVersion: 2.2.0
attributes:
  controller.devfile.io/storage-type: per-workspace
metadata:
  name: ansible-devspaces-offline
components:
  - name: dev-tools
    attributes:
      pod-overrides:
        metadata:
          annotations:
            # Ask for /dev/fuse and /dev/net/tun to be mapped into this Pod
            io.kubernetes.cri-o.Devices: "/dev/fuse,/dev/net/tun"
        spec:
          # Instruct the container runtime to create a new user namespace for the containers in this Pod.
          hostUsers: false
      container-overrides:
        securityContext:
          # Ask for an unmasked /proc to be available to this container
          procMount: Unmasked
    container:
      image: quay.io/jpullen0/ansible-devspaces-nested-podman:opencode
      cpuLimit: 4000m
      cpuRequest: 250m
      memoryLimit: 4Gi
      memoryRequest: 128Mi
      env:
        - name: VSCODE_DEFAULT_WORKSPACE
          value: /projects/devspaces-offline/devspaces.code-workspace
  - name: prep-workspace
    container:
      args:
        - '-c'
        - >-
          mkdir -p /projects/bin && cp /usr/bin/oc /projects/bin/oc && cp /usr/bin/kubectl /projects/bin/kubectl && if [[ -f ${HOME}/.kube/config ]]; then rm ${HOME}/.kube/config; fi
      command:
        - /bin/bash
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      mountSources: true
      sourceMapping: /projects
      memoryRequest: 128Mi
      memoryLimit: 256Mi
      cpuRequest: 10m
      cpuLimit: 200m
      env:
      - name: HOME
        value: "/projects/home"
commands:
  - apply:
      component: prep-workspace
      label: Pre Start Prep
    id: prep-workspace
  - id: install-offline-extensions
    exec:
      component: dev-tools
      commandLine: >-
        EXT_DIR="/projects/devspaces-offline/.vscode/extensions";
        CODE_BIN="";
        RETRIES=0;
        while [ -z "$CODE_BIN" ] && [ "$RETRIES" -lt 30 ]; do
        for candidate in /checode/checode-linux-libc/ubi9/bin/che-code /checode/checode-linux-libc/ubi8/bin/che-code $(command -v che-code 2>/dev/null || true) $(command -v code 2>/dev/null || true) $(command -v code-oss 2>/dev/null || true); do
        if [ -n "$candidate" ] && [ -x "$candidate" ]; then CODE_BIN="$candidate"; break; fi;
        done;
        if [ -z "$CODE_BIN" ]; then RETRIES=$((RETRIES + 1)); echo "Waiting for code CLI (attempt $RETRIES/30)..."; sleep 2; fi;
        done;
        if [ -z "$CODE_BIN" ]; then echo "WARN: No code CLI found after 60s. Extensions not installed." >&2; exit 0; fi;
        echo "Found code CLI: $CODE_BIN";
        RETRIES=0; while [ "$RETRIES" -lt 30 ]; do curl -s -o /dev/null http://127.0.0.1:3100 && break; RETRIES=$((RETRIES + 1)); echo "Waiting for che-code server (attempt $RETRIES/30)..."; sleep 2; done;
        if [ "$RETRIES" -ge 30 ]; then echo "WARN: che-code server not ready after 60s. Extensions not installed." >&2; exit 0; fi;
        echo "che-code server is ready.";
        for vsix in "$EXT_DIR"/redhat.vscode-yaml-*.vsix "$EXT_DIR"/ms-python.vscode-python-envs-*.vsix "$EXT_DIR"/ms-python.debugpy-*.vsix "$EXT_DIR"/ms-python.python-*.vsix "$EXT_DIR"/redhat.ansible-*.vsix "$EXT_DIR"/ms-python.black-formatter-*.vsix; do
        if [ -f "$vsix" ]; then echo "Installing: $vsix"; "$CODE_BIN" --extensions-dir /checode/remote/extensions --install-extension "$vsix" --force || echo "WARN: Failed to install $vsix"; else echo "SKIP: $vsix not found"; fi;
        done;
        echo "Offline extension installation complete."
      workingDir: /projects
events:
  preStart:
    - prep-workspace
  postStart:
    - install-offline-extensions
